<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
        }

        .left {
            width: 30%;
            background: #0d1b4c;
            display: flex;
            flex-direction: column;
        }

        /* CUADRO SUPERIOR */
        .top-msg {
            height: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* LINEA AMARILLA */
        .linea {
            height: 2px;
            background: yellow;
        }

        /* CUADRO INFERIOR */
        .bottom-msg {
            height: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .right {
            width: 70%;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            text-align: center;
        }

        .icon {
            width: 120px;
            height: 120px;
            background: #1c2f4a;
            border-radius: 50%;
            margin: auto;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: orange;
            font-size: 40px;
        }

        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 250px;
            border-radius: 20px;
            border: none;
            background: #4f79a6;
            color: white;
            text-align: center;
        }

        input::placeholder {
            color: white;
        }

        button {
            margin-top: 10px;
            padding: 10px 30px;
            background: #4f79a6;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #35597c;
        }
    </style>
</head>

<body>

<div class="left">

    <div class="top-msg">
        <p id="mensaje1">Bienvenido al sistema institucional</p>
    </div>

    <div class="linea"></div>

    <div class="bottom-msg">
        <p id="mensaje2">Recuerda revisar tu correo institucional</p>
    </div>

</div>

<div class="right">
    <div class="login-box">

        <div class="icon">👥</div>

        <input type="text" id="usuario" placeholder="USUARIO">
        <input type="password" id="password" placeholder="CONTRASEÑA">

        <button onclick="login()">INGRESAR</button>

    </div>
</div>

<script>

const API = "https://clases-api-andresrr.azurewebsites.net";

/* LOGIN */
function login() {

    let user = document.getElementById("usuario").value;
    let pass = document.getElementById("password").value;

    fetch(API + "/login?usuario=" + user + "&password=" + pass, {
        method: "POST"
    })
    .then(res => {
        if(!res.ok){
            throw new Error("Error login");
        }
        return res.json();
    })
    .then(data => {
        alert("Bienvenido " + data.usuario);
        window.location.href = "asignacion.html";
    })
    .catch(err => {
        alert("Usuario o contraseña incorrectos");
    });
}

/* MENSAJES DINÁMICOS */
const mensajes = [
    "Bienvenido al sistema de la Universidad Católica",
    "Recuerda consultar el AVA regularmente",
    "Revisa tu correo institucional para novedades",
    "El sistema de asignación está disponible",
    "Mantén tus datos actualizados"
];

let i = 0;

setInterval(() => {
    i = (i + 1) % mensajes.length;
    document.getElementById("mensaje1").innerText = mensajes[i];
    document.getElementById("mensaje2").innerText = mensajes[(i+1) % mensajes.length];
}, 8000);

</script>

</body>
</html>
