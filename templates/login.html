<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Institucional</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; }
        .left { width: 30%; background: #0d1b4c; display: flex; flex-direction: column; }
        .panel {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; text-align: center; padding: 30px; margin: 10px;
            border: 2px solid #4f79a6; border-radius: 10px; font-size: 14px;
        }
        .panel-img { position: relative; overflow: hidden; }
        .panel-img img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; top:0; left:0; }
        .panel-img .texto { position: relative; z-index: 2; }
        .linea { height: 2px; background: yellow; }
        hr { border: none; border-top: 1px solid #4f79a6; width: 80%; opacity: 0.6; margin: 10px auto; }
        .right { width: 70%; background: #f2f2f2; display: flex; justify-content: center; align-items: center; }
        .box { text-align: center; width: 320px; }
        .icon {
            width: 100px; height: 100px; background: #1c2f4a; border-radius: 50%;
            margin: auto auto 20px; display: flex; justify-content: center;
            align-items: center; color: orange; font-size: 36px;
        }
        .campo {
            display: block; margin: 10px auto; padding: 12px 16px; width: 100%;
            border-radius: 25px; border: 2px solid transparent;
            background: #4f79a6; color: white; text-align: center;
            font-size: 14px; outline: none; transition: border 0.2s;
        }
        .campo::placeholder { color: rgba(255,255,255,0.75); }
        .campo.error { border-color: #ff6b6b; background: #8b2e2e; }
        .campo:focus { border-color: #a8c5e8; }
        .btn-login {
            margin-top: 14px; padding: 12px 36px; background: #4f79a6;
            color: white; border: none; border-radius: 25px;
            cursor: pointer; font-weight: bold; font-size: 14px;
            width: 100%; transition: background 0.2s;
        }
        .btn-login:hover { background: #35597c; }
        .btn-login:disabled { background: #888; cursor: not-allowed; }
        #msg-error {
            background: #ffe0e0; color: #c0392b; border: 1px solid #f5c6cb;
            border-radius: 10px; padding: 10px 14px; margin-top: 12px;
            font-size: 13px; display: none; text-align: left;
        }
        #msg-exito {
            background: #d4edda; color: #155724; border: 1px solid #c3e6cb;
            border-radius: 10px; padding: 10px 14px; margin-top: 12px;
            font-size: 13px; display: none;
        }
    </style>
</head>
<body>

<div class="left">
    <div class="panel">
        <h3 id="msg_1" style="margin-top:0;">Cargando...</h3>
        <hr>
        <p id="msg_2">Sincronizando información institucional.</p>
    </div>
    <div class="linea"></div>
    <div class="panel panel-img">
        <img id="imagen_global" src="" alt="">
        <div class="texto">
            <h3 id="msg_3" style="margin-top:0; color:#ffeb3b;">Cargando...</h3>
            <hr>
            <p id="msg_4">Conectando a base de datos segura.</p>
        </div>
    </div>
</div>

<div class="right">
    <div class="box">
        <div class="icon">👥</div>
        <input type="text"     id="codigo"     class="campo" placeholder="CÓDIGO INSTITUCIONAL" maxlength="10">
        <input type="password" id="contrasena" class="campo" placeholder="CONTRASEÑA">
        <div id="msg-error"></div>
        <div id="msg-exito"></div>
        <button class="btn-login" onclick="ejecutarLogin()" id="btn">INGRESAR</button>
    </div>
</div>

<script>
    const API = window.location.origin;
    let imagenesCarrusel = [];
    let imgIndex = 0;

    // ── Cargar configuración del frontend ──
    fetch(`${API}/front/config`)
        .then(r => r.json())
        .then(d => {
            document.getElementById("msg_1").innerText = d.mensaje_1;
            document.getElementById("msg_2").innerText = d.mensaje_2;
            document.getElementById("msg_3").innerText = d.mensaje_3;
            document.getElementById("msg_4").innerText = d.mensaje_4;
            imagenesCarrusel = [d.url_img_1, d.url_img_2, d.url_img_3].filter(u => u && u.trim());
            rotarImagen();
            setInterval(rotarImagen, 4000);
        })
        .catch(() => {});

    function rotarImagen() {
        if (imagenesCarrusel.length > 0) {
            document.getElementById("imagen_global").src = imagenesCarrusel[imgIndex];
            imgIndex = (imgIndex + 1) % imagenesCarrusel.length;
        }
    }

    // ── Mostrar mensajes ──
    function mostrarError(msg) {
        const el = document.getElementById("msg-error");
        el.innerHTML = "⚠️ " + msg;
        el.style.display = "block";
        document.getElementById("msg-exito").style.display = "none";
    }

    function mostrarExito(msg) {
        const el = document.getElementById("msg-exito");
        el.innerHTML = "✅ " + msg;
        el.style.display = "block";
        document.getElementById("msg-error").style.display = "none";
    }

    function limpiarMensajes() {
        document.getElementById("msg-error").style.display = "none";
        document.getElementById("msg-exito").style.display = "none";
        document.querySelectorAll(".campo").forEach(c => c.classList.remove("error"));
    }

    // ── Validación cliente ──
    function validarCampos(codigo, contrasena) {
        if (!codigo.trim()) {
            document.getElementById("codigo").classList.add("error");
            mostrarError("El código institucional es obligatorio.");
            return false;
        }
        if (!/^\d+$/.test(codigo.trim())) {
            document.getElementById("codigo").classList.add("error");
            mostrarError("El código solo puede contener números, no letras ni símbolos.");
            return false;
        }
        if (codigo.trim().length < 8) {
            document.getElementById("codigo").classList.add("error");
            mostrarError("El código debe tener al menos 8 dígitos.");
            return false;
        }
        if (!contrasena.trim()) {
            document.getElementById("contrasena").classList.add("error");
            mostrarError("La contraseña es obligatoria.");
            return false;
        }
        if (contrasena.trim().length < 4) {
            document.getElementById("contrasena").classList.add("error");
            mostrarError("La contraseña debe tener al menos 4 caracteres.");
            return false;
        }
        return true;
    }

    // ── Limpiar error al escribir ──
    document.getElementById("codigo").addEventListener("input", limpiarMensajes);
    document.getElementById("contrasena").addEventListener("input", limpiarMensajes);

    // ── Enter para iniciar sesión ──
    document.addEventListener("keydown", e => { if (e.key === "Enter") ejecutarLogin(); });

    // ── Login ──
    async function ejecutarLogin() {
        const codigo     = document.getElementById("codigo").value;
        const contrasena = document.getElementById("contrasena").value;

        limpiarMensajes();
        if (!validarCampos(codigo, contrasena)) return;

        const btn = document.getElementById("btn");
        btn.disabled = true;
        btn.innerText = "Verificando...";

        try {
            const res = await fetch(`${API}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ codigo: codigo.trim(), contrasena: contrasena.trim() })
            });

            const data = await res.json();

            if (!res.ok) {
                mostrarError(data.detail || "Error al iniciar sesión.");
                return;
            }

            mostrarExito("Acceso concedido. Redirigiendo...");
            setTimeout(() => {
                window.location.href = `/sesion/${data.token}`;
            }, 600);

        } catch (e) {
            mostrarError("No se pudo conectar con el servidor. Intente de nuevo.");
        } finally {
            btn.disabled = false;
            btn.innerText = "INGRESAR";
        }
    }
</script>
</body>
</html>
