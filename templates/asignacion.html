<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignación de Salones</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; display: flex; height: 100vh; background: #f2f2f2; }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 260px; min-width: 260px; background: #0d1b4c;
            color: white; display: flex; flex-direction: column;
            padding: 20px; gap: 12px;
        }
        .sidebar h2 { font-size: 15px; text-align: center; border-bottom: 1px solid #4f79a6; padding-bottom: 12px; }
        .sidebar .info { background: #1c2f4a; border-radius: 8px; padding: 12px; font-size: 13px; }
        .sidebar .info span { color: #a8c5e8; display: block; margin-bottom: 4px; }
        .sidebar .info strong { font-size: 15px; }
        .sidebar nav { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
        .sidebar nav button {
            background: #4f79a6; color: white; border: none;
            border-radius: 8px; padding: 10px; cursor: pointer;
            font-size: 13px; text-align: left; transition: background 0.2s;
        }
        .sidebar nav button:hover, .sidebar nav button.activo { background: #35597c; }
        .btn-logout {
            margin-top: auto; background: #8b2e2e; color: white;
            border: none; border-radius: 8px; padding: 10px;
            cursor: pointer; font-size: 13px; transition: background 0.2s;
        }
        .btn-logout:hover { background: #a83232; }

        /* ── CONTENIDO ── */
        .contenido { flex: 1; overflow-y: auto; padding: 24px; }
        .panel { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .panel h3 { color: #0d1b4c; margin-bottom: 16px; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; }

        /* ── HORARIO ── */
        .tabla-horario { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tabla-horario th { background: #0d1b4c; color: white; padding: 10px 8px; text-align: center; }
        .tabla-horario td { border: 1px solid #ddd; padding: 8px; text-align: center; vertical-align: middle; min-width: 100px; }
        .tabla-horario td.ocupado { background: #e8f0fe; }
        .tabla-horario td.ocupado strong { display: block; color: #0d1b4c; }
        .tabla-horario td.ocupado small { color: #555; font-size: 11px; }
        .tabla-horario td.vacio { background: #fafafa; color: #bbb; }

        /* ── MENSAJES ── */
        .msg-error { background: #ffe0e0; color: #c0392b; border: 1px solid #f5c6cb; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; display: none; }
        .msg-exito { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; display: none; }

        /* ── FORMULARIOS ── */
        select, input[type="number"] {
            padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc;
            font-size: 13px; margin-right: 8px; margin-bottom: 8px;
        }
        .btn-accion {
            background: #4f79a6; color: white; border: none;
            border-radius: 8px; padding: 10px 20px;
            cursor: pointer; font-size: 13px; transition: background 0.2s;
        }
        .btn-accion:hover { background: #35597c; }
        .btn-accion.verde { background: #27ae60; }
        .btn-accion.verde:hover { background: #1e8449; }
        .btn-accion.rojo { background: #c0392b; }
        .btn-accion.rojo:hover { background: #962d22; }

        /* ── SPINNER ── */
        .cargando { text-align: center; color: #888; padding: 30px; font-size: 14px; }

        /* ── TABLA GRUPOS ── */
        .tabla-grupos { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
        .tabla-grupos th { background: #4f79a6; color: white; padding: 8px; text-align: left; }
        .tabla-grupos td { border-bottom: 1px solid #eee; padding: 8px; }
        .tabla-grupos tr:hover td { background: #f5f8ff; }
        .badge {
            display: inline-block; padding: 3px 8px; border-radius: 12px;
            font-size: 11px; font-weight: bold;
        }
        .badge.verde { background: #d4edda; color: #155724; }
        .badge.rojo { background: #ffe0e0; color: #c0392b; }
    </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<div class="sidebar">
    <h2>🎓 Universidad Católica<br>de Colombia</h2>

    <div class="info">
        <span>Código:</span>
        <strong id="sb-codigo">{{ codigo }}</strong>
        <span style="margin-top:8px;">Rol:</span>
        <strong id="sb-rol">{{ rol }}</strong>
    </div>

    <nav id="nav-menu">
        <button class="activo" onclick="mostrarSeccion('horario')">📅 Mi Horario</button>
        <!-- Los botones adicionales se inyectan según el rol -->
    </nav>

    <button class="btn-logout" onclick="cerrarSesion()">🔒 Cerrar Sesión</button>
</div>

<!-- ── CONTENIDO PRINCIPAL ── -->
<div class="contenido" id="contenido">
    <div class="cargando">Cargando información...</div>
</div>

<script>
    const TOKEN  = "{{ token }}";
    const ROL    = "{{ rol }}";
    const CODIGO = "{{ codigo }}";
    const API    = window.location.origin;

    // ── Inicialización ──
    document.addEventListener("DOMContentLoaded", () => {
        configurarNav();
        mostrarSeccion("horario");
    });

    function configurarNav() {
        const nav = document.getElementById("nav-menu");
        if (ROL === "Estudiante") {
            nav.innerHTML += `<button onclick="mostrarSeccion('inscribir')">📝 Inscribir Materia</button>`;
        } else if (ROL === "Profesor") {
            nav.innerHTML += `<button onclick="mostrarSeccion('salones')">🏫 Cambiar Salón</button>`;
        } else if (ROL === "Administrador") {
            nav.innerHTML += `<button onclick="mostrarSeccion('optimizar')">🤖 Optimizar Horarios</button>`;
            nav.innerHTML += `<button onclick="mostrarSeccion('config')">⚙️ Configurar Página</button>`;
        }
    }

    // ── Navegación ──
    function mostrarSeccion(seccion) {
        document.querySelectorAll(".sidebar nav button").forEach(b => b.classList.remove("activo"));
        event && event.target && event.target.classList && event.target.classList.add("activo");

        const c = document.getElementById("contenido");
        c.innerHTML = `<div class="cargando">⏳ Cargando...</div>`;

        const secciones = {
            horario:   renderHorario,
            inscribir: renderInscribir,
            salones:   renderSalones,
            optimizar: renderOptimizar,
            config:    renderConfig
        };
        if (secciones[seccion]) secciones[seccion]();
    }

    // ── Manejo de errores de API ──
    async function apiGet(url) {
        const r = await fetch(`${API}${url}?token=${TOKEN}`);
        if (!r.ok) { const d = await r.json(); throw new Error(d.detail || "Error del servidor."); }
        return r.json();
    }

    async function apiPost(url, body) {
        const r = await fetch(`${API}${url}?token=${TOKEN}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || "Error del servidor.");
        return d;
    }

    async function apiPut(url) {
        const r = await fetch(`${API}${url}&token=${TOKEN}`, { method: "PUT" });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || "Error del servidor.");
        return d;
    }

    // ────────────────────────────────────────────
    // SECCIÓN: HORARIO
    // ────────────────────────────────────────────
    async function renderHorario() {
        const c = document.getElementById("contenido");
        try {
            const horario = await apiGet("/horarios");
            const horas   = Object.keys(horario).sort();
            const dias    = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

            if (horas.length === 0) {
                c.innerHTML = `
                <div class="panel">
                    <h3>📅 Mi Horario</h3>
                    <p style="color:#888; text-align:center; padding:20px;">
                        No tienes clases asignadas actualmente.
                    </p>
                </div>`;
                return;
            }

            let filas = horas.map(hora => {
                let celdas = dias.map(dia => {
                    const cl = horario[hora] && horario[hora][dia];
                    if (cl) {
                        return `<td class="ocupado">
                            <strong>${cl.materia}</strong>
                            <small>${cl.salon}</small><br>
                            <small>${cl.info_extra}</small>
                        </td>`;
                    }
                    return `<td class="vacio">—</td>`;
                }).join("");
                return `<tr><td><strong>${hora}</strong></td>${celdas}</tr>`;
            }).join("");

            c.innerHTML = `
            <div class="panel">
                <h3>📅 Mi Horario</h3>
                <div style="overflow-x:auto;">
                <table class="tabla-horario">
                    <thead><tr>
                        <th>Hora</th>
                        ${dias.map(d => `<th>${d}</th>`).join("")}
                    </tr></thead>
                    <tbody>${filas}</tbody>
                </table>
                </div>
            </div>`;
        } catch (e) {
            c.innerHTML = `<div class="panel"><div class="msg-error" style="display:block;">⚠️ ${e.message}</div></div>`;
        }
    }

    // ────────────────────────────────────────────
    // SECCIÓN: INSCRIBIR (Estudiante)
    // ────────────────────────────────────────────
    async function renderInscribir() {
        const c = document.getElementById("contenido");
        c.innerHTML = `
        <div class="panel">
            <h3>📝 Inscribir Materia</h3>
            <div id="err-ins" class="msg-error"></div>
            <div id="ok-ins" class="msg-exito"></div>
            <label style="font-size:13px; color:#555;">ID de la materia:</label><br>
            <input type="number" id="id-mat" placeholder="Ej: 1" min="1" style="width:180px;">
            <button class="btn-accion" onclick="buscarGrupos()">Buscar Grupos</button>
            <div id="grupos-cont" style="margin-top:16px;"></div>
        </div>`;
    }

    async function buscarGrupos() {
        const idMat = parseInt(document.getElementById("id-mat").value);
        const cont  = document.getElementById("grupos-cont");
        const errEl = document.getElementById("err-ins");
        errEl.style.display = "none";

        if (!idMat || idMat < 1) {
            errEl.innerHTML = "⚠️ Ingrese un ID de materia válido.";
            errEl.style.display = "block"; return;
        }

        cont.innerHTML = `<div class="cargando">Buscando grupos...</div>`;
        try {
            const grupos = await apiGet(`/materias/${idMat}/grupos`);
            if (!grupos.length) {
                cont.innerHTML = `<p style="color:#888;">No hay grupos disponibles. Se creará uno al inscribirse.</p>`;
            } else {
                const filas = grupos.map(g => `
                <tr>
                    <td>Grupo ${g.num_grupo}</td>
                    <td>${g.dia || "—"}</td>
                    <td>${g.hora || "—"}</td>
                    <td>
                        <span class="badge ${g.inscritos < g.limite ? "verde" : "rojo"}">
                            ${g.inscritos}/${g.limite}
                        </span>
                    </td>
                    <td><button class="btn-accion verde" onclick="inscribirse(${idMat}, ${g.id_grupo})">Elegir</button></td>
                </tr>`).join("");
                cont.innerHTML = `
                <table class="tabla-grupos">
                    <thead><tr><th>Grupo</th><th>Día</th><th>Hora</th><th>Cupo</th><th>Acción</th></tr></thead>
                    <tbody>${filas}</tbody>
                </table>
                <button class="btn-accion" style="margin-top:12px;" onclick="inscribirse(${idMat}, null)">
                    Asignar automáticamente
                </button>`;
            }
        } catch(e) {
            cont.innerHTML = "";
            errEl.innerHTML = "⚠️ " + e.message;
            errEl.style.display = "block";
        }
    }

    async function inscribirse(idMat, idGrupo) {
        const errEl = document.getElementById("err-ins");
        const okEl  = document.getElementById("ok-ins");
        errEl.style.display = "none";
        okEl.style.display  = "none";
        try {
            const r = await apiPost("/inscribir", { id_materia: idMat, id_grupo: idGrupo });
            okEl.innerHTML     = "✅ " + r.mensaje;
            okEl.style.display = "block";
            document.getElementById("grupos-cont").innerHTML = "";
        } catch(e) {
            errEl.innerHTML     = "⚠️ " + e.message;
            errEl.style.display = "block";
        }
    }

    // ────────────────────────────────────────────
    // SECCIÓN: CAMBIAR SALÓN (Profesor)
    // ────────────────────────────────────────────
    async function renderSalones() {
        const c = document.getElementById("contenido");
        c.innerHTML = `
        <div class="panel">
            <h3>🏫 Cambiar Salón de un Grupo</h3>
            <div id="err-sal" class="msg-error"></div>
            <div id="ok-sal"  class="msg-exito"></div>
            <label style="font-size:13px; color:#555;">ID del grupo:</label><br>
            <input type="number" id="id-grp" placeholder="Ej: 1" min="1" style="width:180px;">
            <button class="btn-accion" onclick="buscarSalones()">Ver Salones Disponibles</button>
            <div id="salones-cont" style="margin-top:16px;"></div>
        </div>`;
    }

    async function buscarSalones() {
        const idGrp = parseInt(document.getElementById("id-grp").value);
        const cont  = document.getElementById("salones-cont");
        const errEl = document.getElementById("err-sal");
        errEl.style.display = "none";

        if (!idGrp || idGrp < 1) {
            errEl.innerHTML = "⚠️ Ingrese un ID de grupo válido.";
            errEl.style.display = "block"; return;
        }

        cont.innerHTML = `<div class="cargando">Buscando salones...</div>`;
        try {
            const salones = await apiGet(`/profesor/salones-disponibles/${idGrp}`);
            if (!salones.length) {
                cont.innerHTML = `<p style="color:#888;">No hay salones disponibles para este horario.</p>`;
                return;
            }
            const filas = salones.map(s => `
            <tr>
                <td>${s.nombre}</td>
                <td>${s.capacidad} personas</td>
                <td><button class="btn-accion verde" onclick="cambiarSalon(${idGrp}, ${s.id})">Seleccionar</button></td>
            </tr>`).join("");
            cont.innerHTML = `
            <table class="tabla-grupos">
                <thead><tr><th>Salón</th><th>Capacidad</th><th>Acción</th></tr></thead>
                <tbody>${filas}</tbody>
            </table>`;
        } catch(e) {
            cont.innerHTML = "";
            errEl.innerHTML = "⚠️ " + e.message;
            errEl.style.display = "block";
        }
    }

    async function cambiarSalon(idGrp, idSalon) {
        const errEl = document.getElementById("err-sal");
        const okEl  = document.getElementById("ok-sal");
        errEl.style.display = "none";
        okEl.style.display  = "none";
        try {
            const r = await apiPut(`/profesor/cambiar-salon?id_grupo=${idGrp}&id_nuevo_salon=${idSalon}`);
            okEl.innerHTML     = "✅ " + r.mensaje;
            okEl.style.display = "block";
            document.getElementById("salones-cont").innerHTML = "";
        } catch(e) {
            errEl.innerHTML     = "⚠️ " + e.message;
            errEl.style.display = "block";
        }
    }

    // ────────────────────────────────────────────
    // SECCIÓN: OPTIMIZAR (Admin)
    // ────────────────────────────────────────────
    async function renderOptimizar() {
        const c = document.getElementById("contenido");
        c.innerHTML = `
        <div class="panel">
            <h3>🤖 Optimización Genética de Horarios</h3>
            <p style="color:#555; font-size:13px; margin-bottom:16px;">
                Ejecuta el algoritmo genético para reasignar salones minimizando cruces y respetando capacidades.
                Este proceso puede tardar unos segundos.
            </p>
            <div id="err-opt" class="msg-error"></div>
            <div id="ok-opt"  class="msg-exito"></div>
            <button class="btn-accion verde" id="btn-opt" onclick="ejecutarOptimizacion()">
                ▶ Ejecutar Optimización
            </button>
        </div>`;
    }

    async function ejecutarOptimizacion() {
        const errEl = document.getElementById("err-opt");
        const okEl  = document.getElementById("ok-opt");
        const btn   = document.getElementById("btn-opt");
        errEl.style.display = "none";
        okEl.style.display  = "none";
        btn.disabled    = true;
        btn.innerText   = "⏳ Procesando...";

        try {
            const r = await apiPost("/admin/optimizar-horarios", {});
            okEl.innerHTML     = "✅ " + (r.mensaje || JSON.stringify(r));
            okEl.style.display = "block";
        } catch(e) {
            errEl.innerHTML     = "⚠️ " + e.message;
            errEl.style.display = "block";
        } finally {
            btn.disabled  = false;
            btn.innerText = "▶ Ejecutar Optimización";
        }
    }

    // ────────────────────────────────────────────
    // SECCIÓN: CONFIG (Admin)
    // ────────────────────────────────────────────
    async function renderConfig() {
        const c = document.getElementById("contenido");
        c.innerHTML = `<div class="cargando">Cargando configuración...</div>`;
        try {
            const d = await fetch(`${API}/front/config`).then(r => r.json());
            c.innerHTML = `
            <div class="panel">
                <h3>⚙️ Configurar Página de Login</h3>
                <div id="err-cfg" class="msg-error"></div>
                <div id="ok-cfg"  class="msg-exito"></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
                    <div>
                        <label style="font-size:12px; color:#555;">Mensaje 1</label><br>
                        <input id="m1" type="text" value="${d.mensaje_1}" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
                    </div>
                    <div>
                        <label style="font-size:12px; color:#555;">Mensaje 2</label><br>
                        <input id="m2" type="text" value="${d.mensaje_2}" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
                    </div>
                    <div>
                        <label style="font-size:12px; color:#555;">Mensaje 3</label><br>
                        <input id="m3" type="text" value="${d.mensaje_3}" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
                    </div>
                    <div>
                        <label style="font-size:12px; color:#555;">Mensaje 4</label><br>
                        <input id="m4" type="text" value="${d.mensaje_4}" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
                    </div>
                    <div>
                        <label style="font-size:12px; color:#555;">URL Imagen 1</label><br>
                        <input id="i1" type="text" value="${d.url_img_1}" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
                    </div>
                    <div>
                        <label style="font-size:12px; color:#555;">URL Imagen 2</label><br>
                        <input id="i2" type="text" value="${d.url_img_2}" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
                    </div>
                    <div>
                        <label style="font-size:12px; color:#555;">URL Imagen 3</label><br>
                        <input id="i3" type="text" value="${d.url_img_3}" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc;">
                    </div>
                </div>
                <button class="btn-accion verde" onclick="guardarConfig()">💾 Guardar Cambios</button>
            </div>`;
        } catch(e) {
            c.innerHTML = `<div class="panel"><div class="msg-error" style="display:block;">⚠️ ${e.message}</div></div>`;
        }
    }

    async function guardarConfig() {
        const errEl = document.getElementById("err-cfg");
        const okEl  = document.getElementById("ok-cfg");
        errEl.style.display = "none";
        okEl.style.display  = "none";
        try {
            const r = await fetch(`${API}/front/config`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    codigo_admin: CODIGO,
                    msg_1: document.getElementById("m1").value,
                    msg_2: document.getElementById("m2").value,
                    msg_3: document.getElementById("m3").value,
                    msg_4: document.getElementById("m4").value,
                    img_1: document.getElementById("i1").value,
                    img_2: document.getElementById("i2").value,
                    img_3: document.getElementById("i3").value
                })
            });
            const d = await r.json();
            if (!r.ok) throw new Error(d.detail);
            okEl.innerHTML     = "✅ " + d.mensaje;
            okEl.style.display = "block";
        } catch(e) {
            errEl.innerHTML     = "⚠️ " + e.message;
            errEl.style.display = "block";
        }
    }

    // ── Cerrar sesión ──
    async function cerrarSesion() {
        try {
            await fetch(`${API}/logout?token=${TOKEN}`, { method: "POST" });
        } catch(e) {}
        window.location.href = "/login";
    }
</script>
</body>
</html>
